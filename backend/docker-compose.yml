services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAINS=antonio-byte-dev.dedyn.io
      - EMAIL=your-email@example.com
      - NGINX_PROXY_CONTAINER=nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - pedalboard-net

  backend:
    build:
      context: .
      dockerfile: dockerfile
    env_file: .env
    expose:
      - "8000"          # internal only — no ports: mapping
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - pedalboard-net

  postgres:
    image: postgres:16-alpine
    env_file: .env
    expose:
      - "5432"          # internal only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pedalboard-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    expose:
      - "9000"          # API — internal only
      # 9001 (console) intentionally not exposed
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pedalboard-net

volumes:
  postgres_data:
  minio_data:

networks:
  pedalboard-net:
    driver: bridge
    internal: false   # set true if you want to block all outbound internet too